services:
  streamlit-app:
    build: .
    container_name: supervisor_mangueiras
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:16-alpine
    container_name: supervisor_mangueiras_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
